## Kitchenette — Staffing / FTE Calculator

### Overview
A comprehensive, single-file web application for workforce planning and FTE calculation across Risk Operations verticals. All data is embedded as JavaScript objects with no external dependencies.

### Calculation Chain
1. **Monthly Volume** = Avg Volume × Working Days
2. **Total Work (hrs)** = Monthly Volume × AHT / 3600 / Occupancy
3. **Prod Hrs** = Workload% × Total Work
4. **Shrink Hrs** = (Shrink / (1 - Shrink)) × Prod Hrs
   - "Internal" workforce → Shrink Internal rate
   - All other workforce types → Shrink External rate
5. **Total Hrs** = Prod Hrs + Shrink Hrs
6. **FTE** = Total Hrs / 8 / Working Days

### Data Sources (Embedded)
- **Calendar**: Working days per month (Apr–Dec)
- **Shrink Sheet**: Occupancy, shrink internal, shrink external rates per vertical per month
- **Workload Sheet**: AHT and avg volume per vertical/queue per month
- **Workload % Sheet**: Workforce type allocation percentages per vertical/queue per month

### Verticals (10)
Afterpay, ATO, Appeals, Banking, BIT, Disputes, Foundations, I & C, Scam, Square

### Workforce Types (9)
Internal, Con - India, Con - Latam, Probe - India, ALMS - India, Sutherland - India, Foundever - Latam, Foundever - US, EXL - India

### UI Design
- **Theme**: Dark professional with gradient header
- **Header**: App title, subtitle, row count indicator, CSV export button
- **Filter Bar**: Sticky, with 4 multi-select dropdowns (Vertical, Queue, Workforce Type, Month), each with "Select All" toggle
- **Queue Filter**: Dynamically filtered based on selected verticals

### Tabs
1. **Detail Table**: Full row-level data with all 16 calculation columns, sortable headers, clickable rows for calculation breakdown modal, totals row, zero-volume rows grayed out, color-coded workforce type badges and left borders, max 2000 rows rendered with notice
2. **FTE by Vertical**: 3-level hierarchical collapsible table (Vertical → Queue → Workforce Type) with month columns and totals, expand/collapse arrows, grand total row
3. **FTE by Workforce**: Flat pivot table showing FTE by workforce type × month with totals

### Interactive Features
- Multi-select filter dropdowns with Select All toggle
- Column sorting on detail table (ascending/descending)
- Calculation breakdown modal on row click
- Hierarchical expand/collapse on FTE by Vertical tab
- CSV export of filtered data
- Row count indicator

### Critical Rules
- Shrink rate selection based on workforce type (Internal vs External)
- Zero AHT or zero volume → all downstream calculations = 0
- Shrink rate of 1 → shrink hours = 0 (division by zero protection)
- Working days of 0 → FTE = 0

// ===== EXCEL PARSER =====
function parseNum(v) {
  if (v === null || v === undefined || v === '' || v === '—' || v === '-') return 0;
  const n = Number(v);
  return isNaN(n) ? 0 : n;
}

function toShortMonth(s) {
  if (!s) return null;
  s = String(s).trim();
  if (monthMap[s]) return monthMap[s];
  if (shortMonthMap[s]) return shortMonthMap[s];
  // Try first 3 chars
  const s3 = s.substring(0,3);
  if (shortMonthMap[s3]) return shortMonthMap[s3];
  return null;
}

function parseExcel(arrayBuffer) {
  const wb = XLSX.read(arrayBuffer, {type:'array'});

  // Normalize vertical names so "I&C" and "I & C" match
  // Uses the Shrink sheet names as the canonical source
  let verticalNameMap = {}; // normalized key -> canonical name
  function normalizeKey(s) { return s.replace(/\s+/g, '').toLowerCase(); }
  function canonicalVertical(s) {
    const key = normalizeKey(s);
    if (verticalNameMap[key]) return verticalNameMap[key];
    verticalNameMap[key] = s; // first seen becomes canonical
    return s;
  }

  // ===== CALENDAR SHEET =====
  const calSheet = wb.Sheets['Calendar'];
  if (!calSheet) throw new Error('Missing "Calendar" sheet');
  const calData = XLSX.utils.sheet_to_json(calSheet, {header:1});

  // Row 0 = headers: Month, January, February, ...
  const calHeaders = calData[0];
  const calMonthCols = []; // [{col index, short month name}]
  for (let i = 1; i < calHeaders.length; i++) {
    const sm = toShortMonth(calHeaders[i]);
    if (sm) calMonthCols.push({idx: i, month: sm});
  }

  // Find "Working Days" row (the one that includes weekends, not M-F only)
  let wdRow = null;
  for (let r = 1; r < calData.length; r++) {
    const label = String(calData[r][0] || '').trim();
    if (label === 'Working Days') { wdRow = calData[r]; break; }
  }
  if (!wdRow) throw new Error('Missing "Working Days" row in Calendar sheet');

  // Collect all calendar months with working days (will be filtered later)
  const calWorkingDays = {};
  calMonthCols.forEach(mc => {
    const wd = parseNum(wdRow[mc.idx]);
    if (wd > 0) calWorkingDays[mc.month] = wd;
  });

  // ===== SHRINK SHEET =====
  const shrinkSheet = wb.Sheets['Shrink'];
  if (!shrinkSheet) throw new Error('Missing "Shrink" sheet');
  const shrinkRaw = XLSX.utils.sheet_to_json(shrinkSheet, {header:1});

  // Row 0 = headers: Vertical, Metric, month1, month2, ...
  const shrinkHeaders = shrinkRaw[0];
  const shrinkMonthCols = [];
  for (let i = 2; i < shrinkHeaders.length; i++) {
    const sm = toShortMonth(shrinkHeaders[i]);
    if (sm && calWorkingDays[sm]) shrinkMonthCols.push({idx: i, month: sm});
  }

  // Use only months that appear in the Shrink sheet AND have working days
  months = shrinkMonthCols.map(mc => mc.month);
  workingDays = {};
  months.forEach(m => { workingDays[m] = calWorkingDays[m]; });

  shrinkData = {};
  let currentVertical = '';
  for (let r = 1; r < shrinkRaw.length; r++) {
    const row = shrinkRaw[r];
    if (!row || row.every(c => c === null || c === undefined || c === '')) continue;
    if (row[0] && String(row[0]).trim()) currentVertical = canonicalVertical(String(row[0]).trim());
    const metric = String(row[1] || '').trim();
    if (!currentVertical || !metric) continue;

    if (!shrinkData[currentVertical]) {
      shrinkData[currentVertical] = {occupancy:{}, shrinkInternal:{}, shrinkExternal:{}};
      months.forEach(m => {
        shrinkData[currentVertical].occupancy[m] = 0;
        shrinkData[currentVertical].shrinkInternal[m] = 0;
        shrinkData[currentVertical].shrinkExternal[m] = 0;
      });
    }

    shrinkMonthCols.forEach(mc => {
      const val = parseNum(row[mc.idx]);
      if (metric === 'Occupancy') shrinkData[currentVertical].occupancy[mc.month] = val;
      else if (metric === 'Shrink - Internal') shrinkData[currentVertical].shrinkInternal[mc.month] = val;
      else if (metric === 'Shrink - External') shrinkData[currentVertical].shrinkExternal[mc.month] = val;
    });
  }

  // ===== WORKLOAD SHEET =====
  const wlSheet = wb.Sheets['Workload'];
  if (!wlSheet) throw new Error('Missing "Workload" sheet');
  const wlRaw = XLSX.utils.sheet_to_json(wlSheet, {header:1});

  const wlHeaders = wlRaw[0];
  const wlMonthCols = [];
  for (let i = 3; i < wlHeaders.length; i++) {
    const sm = toShortMonth(wlHeaders[i]);
    if (sm && months.includes(sm)) wlMonthCols.push({idx: i, month: sm});
  }

  workloadData = [];
  let wlVertical = '', wlQueue = '';
  const wlMap = {}; // key -> {vertical, queue, aht:{}, avgVolume:{}}
  for (let r = 1; r < wlRaw.length; r++) {
    const row = wlRaw[r];
    if (!row || row.every(c => c === null || c === undefined || c === '')) continue;
    if (row[0] && String(row[0]).trim()) wlVertical = canonicalVertical(String(row[0]).trim());
    if (row[1] && String(row[1]).trim()) wlQueue = String(row[1]).trim();
    const metric = String(row[2] || '').trim();
    if (!wlVertical || !wlQueue || !metric) continue;
    if (metric !== 'AHT' && metric !== 'Avg Volume') continue;

    const key = wlVertical + '|||' + wlQueue;
    if (!wlMap[key]) {
      wlMap[key] = {vertical: wlVertical, queue: wlQueue, aht: {}, avgVolume: {}};
      months.forEach(m => { wlMap[key].aht[m] = 0; wlMap[key].avgVolume[m] = 0; });
    }

    wlMonthCols.forEach(mc => {
      const val = parseNum(row[mc.idx]);
      if (metric === 'AHT') wlMap[key].aht[mc.month] = val;
      else if (metric === 'Avg Volume') wlMap[key].avgVolume[mc.month] = val;
    });
  }
  workloadData = Object.values(wlMap);

  // ===== WORKLOAD% SHEET =====
  const wpSheet = wb.Sheets['Workload%'];
  if (!wpSheet) throw new Error('Missing "Workload%" sheet');
  const wpRaw = XLSX.utils.sheet_to_json(wpSheet, {header:1});

  const wpHeaders = wpRaw[0];
  const wpMonthCols = [];
  for (let i = 3; i < wpHeaders.length; i++) {
    const sm = toShortMonth(wpHeaders[i]);
    if (sm && months.includes(sm)) wpMonthCols.push({idx: i, month: sm});
  }

  workloadPctData = [];
  let wpVertical = '', wpQueue = '';
  for (let r = 1; r < wpRaw.length; r++) {
    const row = wpRaw[r];
    if (!row || row.every(c => c === null || c === undefined || c === '')) continue;
    if (row[0] && String(row[0]).trim()) wpVertical = canonicalVertical(String(row[0]).trim());
    if (row[1] && String(row[1]).trim()) wpQueue = String(row[1]).trim();
    const wfType = String(row[2] || '').trim();
    if (!wpVertical || !wpQueue || !wfType) continue;

    const pct = {};
    wpMonthCols.forEach(mc => { pct[mc.month] = parseNum(row[mc.idx]); });
    workloadPctData.push({vertical: wpVertical, queue: wpQueue, type: wfType, pct});
  }

  // ===== VERSION SHEET (optional) =====
  const verSheet = wb.Sheets['Version'];
  if (verSheet) {
    const verRaw = XLSX.utils.sheet_to_json(verSheet, {header:1});
    versionHistory = [];
    // Columns I-N = indices 8-13: Date, Vertical, Group, Queue, Action, Notes/Impact
    for (let r = 1; r < verRaw.length; r++) {
      const row = verRaw[r];
      if (!row) continue;
      const dateVal = row[8];
      const vertical = String(row[9] || '').trim();
      const group = String(row[10] || '').trim();
      const queue = String(row[11] || '').trim();
      const action = String(row[12] || '').trim();
      const notes = String(row[13] || '').trim();
      // Skip empty rows
      if (!dateVal && !vertical && !action) continue;
      // Format date
      let dateStr = '';
      if (dateVal instanceof Date) {
        dateStr = dateVal.toISOString().split('T')[0];
      } else if (typeof dateVal === 'number') {
        // Excel serial date
        const d = new Date((dateVal - 25569) * 86400000);
        dateStr = d.toISOString().split('T')[0];
      } else if (dateVal) {
        dateStr = String(dateVal).split(' ')[0];
      }
      versionHistory.push({date: dateStr, vertical, group, queue, action, notes});
    }
  }

  // ===== RISK OPS 2026 TARGETS (optional) =====
  // If present, use Total rows as authoritative monthly targets.
  riskOpsTargets = null;
  const riskSheet = wb.Sheets['Risk Ops 2026'];
  if (riskSheet) {
    const riskRaw = XLSX.utils.sheet_to_json(riskSheet, {header:1});
    const row2 = riskRaw[1] || [];
    const monthCols = {};
    // Forecast Jan-Dec block is on the left side (cols C:N)
    for (let c = 2; c <= 13; c++) {
      const sm = toShortMonth(row2[c]);
      if (sm) monthCols[sm] = c;
    }
    const metricMap = {
      'Internal Required PROD Hrs': {grp:'int', key:'prodHrs'},
      'External Required PROD Hrs': {grp:'ext', key:'prodHrs'},
      'Internal Required SHRINK Hrs': {grp:'int', key:'shrinkHrs'},
      'External Required SHRINK Hrs': {grp:'ext', key:'shrinkHrs'},
      'Internal Required TOTAL Hrs': {grp:'int', key:'totalHrs'},
      'External Required TOTAL Hrs': {grp:'ext', key:'totalHrs'},
      'Internal Required FTE': {grp:'int', key:'fte'},
      'External Required FTE': {grp:'ext', key:'fte'}
    };
    const makeMonthBucket = () => ({int:{prodHrs:0, shrinkHrs:0, totalHrs:0, fte:0}, ext:{prodHrs:0, shrinkHrs:0, totalHrs:0, fte:0}});
    const targetsBySection = {};
    for (let r = 0; r < riskRaw.length; r++) {
      const row = riskRaw[r] || [];
      const rawSection = String(row[0] || '').trim();
      const metric = String(row[1] || '').trim();
      const map = metricMap[metric];
      if (!map) continue;
      if (!rawSection) continue;
      let section = rawSection === 'I&C' ? 'I & C' : rawSection;
      if (section !== 'Total') section = canonicalVertical(section);
      if (!targetsBySection[section]) {
        targetsBySection[section] = {};
        Object.keys(monthCols).forEach(m => { targetsBySection[section][m] = makeMonthBucket(); });
      }
      Object.entries(monthCols).forEach(([m, c]) => {
        targetsBySection[section][m][map.grp][map.key] = parseNum(row[c]);
      });
    }
    if (targetsBySection.Total) riskOpsTargets = {bySection: targetsBySection};
  }

  // ===== BUILD ALL ROWS =====
  buildRowsVerticalWorkforceAllocation();
}
// ===== CALCULATION ENGINE =====
function calculate(vertical, queue, wfType, month) {
  const wl = workloadData.find(w => w.vertical === vertical && w.queue === queue);
  if (!wl) return null;
  const sd = shrinkData[vertical];
  if (!sd) return null;
  const wp = workloadPctData.find(w => w.vertical === vertical && w.queue === queue && w.type === wfType);
  if (!wp) return null;

  const avgVol = wl.avgVolume[month] || 0;
  const aht = wl.aht[month] || 0;
  const wd = workingDays[month];
  const occ = sd.occupancy[month];
  const wlPct = wp.pct[month] || 0;
  const isInternal = wfType === "Internal";
  const shrinkRate = isInternal ? sd.shrinkInternal[month] : sd.shrinkExternal[month];

  const monthlyVol = avgVol * wd;
  const totalWork = (aht === 0 || avgVol === 0 || occ === 0) ? 0 : (monthlyVol * aht / 3600 / occ);
  const prodHrs = wlPct * totalWork;
  const shrinkHrs = (shrinkRate === 1) ? 0 : (shrinkRate / (1 - shrinkRate)) * prodHrs;
  const totalHrs = prodHrs + shrinkHrs;
  const fte = (wd === 0) ? 0 : totalHrs / 8 / wd;

  return { avgVol, wd, monthlyVol, aht, occ, totalWork, wlPct, prodHrs, shrinkRate, shrinkHrs, totalHrs, fte, vertical, queue, wfType, month };
}

// ===== VERTICAL-LEVEL WORKFORCE ALLOCATION =====
// Uses workforce % at the vertical+month level and distributes back to queues
// by (monthly volume * AHT), as requested.
function buildRowsVerticalWorkforceAllocation() {
  allRows = [];

  const queuesByVertical = {};
  workloadData.forEach(w => {
    if (!queuesByVertical[w.vertical]) queuesByVertical[w.vertical] = [];
    queuesByVertical[w.vertical].push(w);
  });

  const typesByVertical = {};
  workloadPctData.forEach(wp => {
    if (!typesByVertical[wp.vertical]) typesByVertical[wp.vertical] = new Set();
    typesByVertical[wp.vertical].add(wp.type);
  });

  // Average queue-level workforce % to one vertical-level % per type+month.
  const verticalPct = {};
  workloadPctData.forEach(wp => {
    const k = wp.vertical + '|||' + wp.type;
    if (!verticalPct[k]) {
      verticalPct[k] = {};
      months.forEach(m => { verticalPct[k][m] = {sum: 0, count: 0}; });
    }
    months.forEach(m => {
      const v = parseNum(wp.pct[m]);
      verticalPct[k][m].sum += v;
      verticalPct[k][m].count += 1;
    });
  });

  Object.keys(queuesByVertical).forEach(vertical => {
    const sd = shrinkData[vertical];
    if (!sd) return;
    const queues = queuesByVertical[vertical];
    const types = typesByVertical[vertical] ? [...typesByVertical[vertical]] : [];
    if (!types.length) return;

    months.forEach(month => {
      const wd = workingDays[month] || 0;

      const queueStats = queues.map(q => {
        const avgVol = q.avgVolume[month] || 0;
        const aht = q.aht[month] || 0;
        const occ = sd.occupancy[month] || 0;
        const monthlyVol = avgVol * wd;
        const totalWork = (aht === 0 || avgVol === 0 || occ === 0) ? 0 : (monthlyVol * aht / 3600 / occ);
        const distBasis = monthlyVol * aht; // requested queue distribution basis
        return {queue: q.queue, avgVol, aht, occ, monthlyVol, totalWork, distBasis};
      });

      const verticalTotalWork = queueStats.reduce((s, q) => s + q.totalWork, 0);
      const distSum = queueStats.reduce((s, q) => s + Math.max(0, q.distBasis), 0);

      types.forEach(wfType => {
        const pctKey = vertical + '|||' + wfType;
        const pctCell = verticalPct[pctKey] && verticalPct[pctKey][month];
        const wlPct = pctCell && pctCell.count > 0 ? (pctCell.sum / pctCell.count) : 0;
        const isInternal = wfType === 'Internal';
        const shrinkRate = isInternal ? (sd.shrinkInternal[month] || 0) : (sd.shrinkExternal[month] || 0);

        const verticalProdHrs = wlPct * verticalTotalWork;
        const verticalShrinkHrs = (shrinkRate === 1) ? 0 : (shrinkRate / (1 - shrinkRate)) * verticalProdHrs;
        const verticalTotalHrs = verticalProdHrs + verticalShrinkHrs;
        const verticalFte = (wd === 0) ? 0 : verticalTotalHrs / 8 / wd;

        queueStats.forEach((q, idx) => {
          const share = distSum > 0 ? Math.max(0, q.distBasis) / distSum : (1 / queueStats.length);
          allRows.push({
            avgVol: q.avgVol,
            wd,
            monthlyVol: q.monthlyVol,
            aht: q.aht,
            occ: q.occ,
            totalWork: q.totalWork,
            wlPct,
            prodHrs: verticalProdHrs * share,
            shrinkRate,
            shrinkHrs: verticalShrinkHrs * share,
            totalHrs: verticalTotalHrs * share,
            fte: verticalFte * share,
            vertical,
            queue: q.queue,
            wfType,
            month
          });
        });
      });
    });
  });
}

// ===== OPTIONAL CALIBRATION TO RISK OPS 2026 TOTALS =====
function applyRiskOpsTargetsToRows() {
  if (!riskOpsTargets || !allRows.length) return;

  const grouped = {};
  allRows.forEach((r, idx) => {
    const grp = r.wfType === 'Internal' ? 'int' : 'ext';
    const totalKey = 'Total|' + r.month + '|' + grp;
    if (!grouped[totalKey]) grouped[totalKey] = [];
    grouped[totalKey].push(idx);
    const sectionKey = r.vertical + '|' + r.month + '|' + grp;
    if (!grouped[sectionKey]) grouped[sectionKey] = [];
    grouped[sectionKey].push(idx);
  });

  const targetsBySection = riskOpsTargets.bySection ? riskOpsTargets.bySection : {Total: riskOpsTargets};

  function calibrateBucket(idxs, target) {
    if (!idxs.length || !target) return;
    // PROD Hrs scaling (or weighted allocation when baseline is zero)
    let curProd = idxs.reduce((s, i) => s + (allRows[i].prodHrs || 0), 0);
    if (target.prodHrs > 0 && curProd === 0) {
      const wSum = idxs.reduce((s, i) => s + Math.max(0, allRows[i].wlPct || 0), 0);
      idxs.forEach(i => {
        const w = Math.max(0, allRows[i].wlPct || 0);
        const share = wSum > 0 ? w / wSum : 1 / idxs.length;
        allRows[i].prodHrs = target.prodHrs * share;
      });
    } else if (curProd > 0) {
      const fProd = target.prodHrs / curProd;
      idxs.forEach(i => { allRows[i].prodHrs = (allRows[i].prodHrs || 0) * fProd; });
    }

    // SHRINK Hrs scaling (or mirror distribution when baseline is zero)
    let curShrink = idxs.reduce((s, i) => s + (allRows[i].shrinkHrs || 0), 0);
    if (target.shrinkHrs > 0 && curShrink === 0) {
      const pSum = idxs.reduce((s, i) => s + Math.max(0, allRows[i].prodHrs || 0), 0);
      idxs.forEach(i => {
        const p = Math.max(0, allRows[i].prodHrs || 0);
        const share = pSum > 0 ? p / pSum : 1 / idxs.length;
        allRows[i].shrinkHrs = target.shrinkHrs * share;
      });
    } else if (curShrink > 0) {
      const fShrink = target.shrinkHrs / curShrink;
      idxs.forEach(i => { allRows[i].shrinkHrs = (allRows[i].shrinkHrs || 0) * fShrink; });
    }

    // Force totals and FTE to line up with targets.
    idxs.forEach(i => {
      allRows[i].totalHrs = (allRows[i].prodHrs || 0) + (allRows[i].shrinkHrs || 0);
    });
    const curTotal = idxs.reduce((s, i) => s + (allRows[i].totalHrs || 0), 0);
    if (curTotal > 0 && target.totalHrs > 0) {
      const fTotal = target.totalHrs / curTotal;
      idxs.forEach(i => {
        allRows[i].prodHrs *= fTotal;
        allRows[i].shrinkHrs *= fTotal;
        allRows[i].totalHrs *= fTotal;
      });
    }
    idxs.forEach(i => {
      allRows[i].fte = allRows[i].wd > 0 ? allRows[i].totalHrs / 8 / allRows[i].wd : 0;
    });
  }

  // Pass 1: vertical sections
  Object.keys(targetsBySection).forEach(section => {
    if (section === 'Total') return;
    const sectionTargets = targetsBySection[section] || {};
    Object.keys(sectionTargets).forEach(month => {
      ['int','ext'].forEach(grp => {
        const idxs = grouped[section + '|' + month + '|' + grp] || [];
        calibrateBucket(idxs, sectionTargets[month][grp]);
      });
    });
  });

  // Pass 2: reconcile Total section so top-line still matches exactly.
  const totalTargets = targetsBySection.Total || {};
  Object.keys(totalTargets).forEach(month => {
    ['int','ext'].forEach(grp => {
      const idxs = grouped['Total|' + month + '|' + grp] || [];
      if (!idxs.length) return;
      calibrateBucket(idxs, totalTargets[month][grp]);
    });
  });
}

// ===== DROPDOWN BUILDER =====
function buildDropdown(ddEl, items, selectedSet, btnEl, allLabel, onChange) {
  ddEl.innerHTML = '';
  const saDiv = document.createElement('div');
  saDiv.className = 'dropdown-item select-all';
  const saCb = document.createElement('input');
  saCb.type = 'checkbox';
  saCb.checked = selectedSet.size === items.length;
  saDiv.appendChild(saCb);
  saDiv.appendChild(document.createTextNode('Select All'));
  saDiv.addEventListener('click', e => {
    e.stopPropagation();
    if (selectedSet.size === items.length) { selectedSet.clear(); saCb.checked = false; }
    else { items.forEach(i => selectedSet.add(i)); saCb.checked = true; }
    ddEl.querySelectorAll('.item-cb').forEach(cb => cb.checked = selectedSet.has(cb.dataset.val));
    updateBtnLabel(btnEl, selectedSet, items, allLabel);
    onChange();
  });
  ddEl.appendChild(saDiv);

  items.forEach(item => {
    const div = document.createElement('div');
    div.className = 'dropdown-item';
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.className = 'item-cb';
    cb.dataset.val = item;
    cb.checked = selectedSet.has(item);
    div.appendChild(cb);
    div.appendChild(document.createTextNode(item));
    div.addEventListener('click', e => {
      e.stopPropagation();
      if (selectedSet.has(item)) selectedSet.delete(item); else selectedSet.add(item);
      cb.checked = selectedSet.has(item);
      saCb.checked = selectedSet.size === items.length;
      updateBtnLabel(btnEl, selectedSet, items, allLabel);
      onChange();
    });
    ddEl.appendChild(div);
  });
  updateBtnLabel(btnEl, selectedSet, items, allLabel);
}

function updateBtnLabel(btn, sel, items, allLabel) {
  if (sel.size === items.length || sel.size === 0) btn.textContent = allLabel;
  else if (sel.size === 1) btn.textContent = [...sel][0];
  else if (sel.size <= 2) btn.textContent = [...sel].join(', ');
  else btn.textContent = sel.size + ' selected';
}

function getFilteredRows() {
  return allRows.filter(r =>

    selectedQueues.has(r.queue) &&
    selectedWfTypes.has(r.wfType) &&
    selectedMonths.has(r.month)

function render() {
  const filtered = getFilteredRows();
  document.getElementById('rowCount').textContent = 'Showing ' + filtered.length.toLocaleString() + ' of ' + allRows.length.toLocaleString() + ' rows';

  document.getElementById('detailSection').classList.toggle('section-hidden', activeTab !== 'detail');
  document.getElementById('pivotVerticalSection').classList.toggle('section-hidden', activeTab !== 'pivotVertical');
  document.getElementById('pivotVerticalNoQueuesSection').classList.toggle('section-hidden', activeTab !== 'pivotVerticalNoQueues');
  document.getElementById('pivotWfSection').classList.toggle('section-hidden', activeTab !== 'pivotWf');
  document.getElementById('hrsByWfSection').classList.toggle('section-hidden', activeTab !== 'hrsByWf');
  document.getElementById('versionHistorySection').classList.toggle('section-hidden', activeTab !== 'versionHistory');

  if (activeTab === 'detail') renderDetail(filtered);
  else if (activeTab === 'pivotVertical') renderPivotVertical(filtered);
  else if (activeTab === 'pivotVerticalNoQueues') renderPivotVerticalNoQueues(filtered);
  else if (activeTab === 'pivotWf') renderPivotWf(filtered);
  else if (activeTab === 'hrsByWf') renderHrsByWf(filtered);
  else if (activeTab === 'versionHistory') renderVersionHistory();
}

function renderDetail(filtered) {
  let rows = [...filtered];
  if (sortCol >= 0) {
    const col = columns[sortCol];
    rows.sort((a, b) => {
      let va = a[col.key], vb = b[col.key];
      if (typeof va === 'string') return sortDir * va.localeCompare(vb);
      return sortDir * (va - vb);
    });
  }

  const head = document.getElementById('mainHead');
  head.innerHTML = '';
  columns.forEach((c, i) => {
    const th = document.createElement('th');
    th.textContent = c.label + (sortCol === i ? (sortDir === 1 ? ' ▲' : ' ▼') : '');
    th.addEventListener('click', () => {
      if (sortCol === i) sortDir *= -1; else { sortCol = i; sortDir = 1; }
      render();
    });
    head.appendChild(th);
  });

  const body = document.getElementById('mainBody');
  body.innerHTML = '';

  const maxRender = 2000;
  const renderRows = rows.slice(0, maxRender);

  renderRows.forEach(r => {
    const tr = document.createElement('tr');
    if (r.avgVol === 0 || r.aht === 0) tr.className = 'zero-row';
    tr.style.cursor = 'pointer';
    tr.addEventListener('click', () => showModal(r));

    columns.forEach((c, i) => {
      const td = document.createElement('td');
      if (i === 0) td.className = wfClass(r.wfType);
      if (c.num) td.className = (td.className ? td.className + ' ' : '') + 'num';
      if (c.key === 'fte') td.className = (td.className ? td.className + ' ' : '') + 'fte';
      if (c.key === 'wfType') {
        const badge = document.createElement('span');
        badge.className = 'wf-badge ' + (r.wfType === 'Internal' ? 'internal' : 'external');
        badge.textContent = c.fmt(r[c.key]);
        td.appendChild(badge);
      } else {
        td.textContent = c.fmt(r[c.key]);
      }
      tr.appendChild(td);
    });
    body.appendChild(tr);
  });

  if (rows.length > 0) {
    const totals = {avgVol:0,monthlyVol:0,totalWork:0,prodHrs:0,shrinkHrs:0,totalHrs:0,fte:0};
    rows.forEach(r => { Object.keys(totals).forEach(k => totals[k] += r[k]); });
    const tr = document.createElement('tr');
    tr.className = 'totals-row';
    columns.forEach(c => {
      const td = document.createElement('td');
      if (c.key === 'vertical') td.textContent = 'TOTAL';
      else if (totals[c.key] !== undefined) {
        td.className = 'num' + (c.key === 'fte' ? ' fte' : '');
        td.textContent = c.fmt(totals[c.key]);
      }
      tr.appendChild(td);
    });
    body.appendChild(tr);
  }

  if (rows.length > maxRender) {
    const tr = document.createElement('tr');
    const td = document.createElement('td');
    td.colSpan = columns.length;
    td.style.cssText = 'text-align:center;color:var(--text3);padding:12px;font-style:italic';
    td.textContent = 'Showing first ' + maxRender + ' of ' + rows.length + ' rows. Use filters to narrow results.';
    tr.appendChild(td);
    body.appendChild(tr);
  }
}

// ===== HIERARCHICAL PIVOT BY VERTICAL =====
function renderPivotVertical(filtered) {
  const container = document.getElementById('pivotVerticalSection');
  const activeMonths = months.filter(m => selectedMonths.has(m));

  const tree = {};
  filtered.forEach(r => {
    if (!tree[r.vertical]) tree[r.vertical] = {};
    if (!tree[r.vertical][r.queue]) tree[r.vertical][r.queue] = {};
    if (!tree[r.vertical][r.queue][r.wfType]) {
      tree[r.vertical][r.queue][r.wfType] = {};
      activeMonths.forEach(m => tree[r.vertical][r.queue][r.wfType][m] = 0);
    }
    tree[r.vertical][r.queue][r.wfType][r.month] += r.fte;
  });

  const verticalAgg = {};
  const queueAgg = {};
  const grandTotal = {};
  activeMonths.forEach(m => grandTotal[m] = 0);

  Object.keys(tree).sort().forEach(v => {
    verticalAgg[v] = {};
    activeMonths.forEach(m => verticalAgg[v][m] = 0);
    Object.keys(tree[v]).sort().forEach(q => {
      const qKey = v + '|||' + q;
      queueAgg[qKey] = {};
      activeMonths.forEach(m => queueAgg[qKey][m] = 0);
      Object.keys(tree[v][q]).sort().forEach(wf => {
        activeMonths.forEach(m => {
          const val = tree[v][q][wf][m] || 0;
          queueAgg[qKey][m] += val;
          verticalAgg[v][m] += val;
          grandTotal[m] += val;
        });
      });
    });
  });

  let html = '<div class="pivot-title">FTE by Vertical — Hierarchical Drill-Down</div>';
  html += '<div class="hier-table"><table><thead><tr><th style="min-width:280px">Name</th>';
  activeMonths.forEach(m => html += '<th class="num-col">' + m + '</th>');
  html += '<th class="num-col">Total</th></tr></thead><tbody id="hierBody">';
  html += '</tbody></table></div>';
  container.innerHTML = html;

  const tbody = document.getElementById('hierBody');

  const sortedVerticals = Object.keys(tree).sort();

  sortedVerticals.forEach(v => {
    const vExpanded = hierExpandedVerticals.has(v);
    const vTotal = activeMonths.reduce((s, m) => s + (verticalAgg[v][m] || 0), 0);

    const vtr = document.createElement('tr');
    vtr.className = 'level-1';
    vtr.dataset.vertical = v;
    let vtd = document.createElement('td');
    vtd.className = 'name-cell indent-1';
    vtd.innerHTML = '<span class="toggle-arrow">' + (vExpanded ? '▼' : '▶') + '</span> ' + escHtml(v);
    vtr.appendChild(vtd);
    activeMonths.forEach(m => {
      const td = document.createElement('td');
      td.className = 'num-cell';
      td.textContent = fmtInt(verticalAgg[v][m] || 0);
      vtr.appendChild(td);
    });
    const vTotalTd = document.createElement('td');
    vTotalTd.className = 'num-cell';
    vTotalTd.textContent = fmtInt(vTotal);
    vtr.appendChild(vTotalTd);

    vtr.addEventListener('click', () => {
      if (hierExpandedVerticals.has(v)) hierExpandedVerticals.delete(v);
      else hierExpandedVerticals.add(v);
      renderPivotVertical(filtered);
    });
    tbody.appendChild(vtr);

    if (!vExpanded) return;

    const sortedQueues = Object.keys(tree[v]).sort();
    sortedQueues.forEach(q => {
      const qKey = v + '|||' + q;
      const qExpanded = hierExpandedQueues.has(qKey);
      const qTotal = activeMonths.reduce((s, m) => s + (queueAgg[qKey][m] || 0), 0);

      const qtr = document.createElement('tr');
      qtr.className = 'level-2';
      let qtd = document.createElement('td');
      qtd.className = 'name-cell indent-2';
      qtd.innerHTML = '<span class="toggle-arrow">' + (qExpanded ? '▼' : '▶') + '</span> ' + escHtml(q);
      qtr.appendChild(qtd);
      activeMonths.forEach(m => {
        const td = document.createElement('td');
        td.className = 'num-cell';
        td.textContent = fmtInt(queueAgg[qKey][m] || 0);
        qtr.appendChild(td);
      });
      const qTotalTd = document.createElement('td');
      qTotalTd.className = 'num-cell';
      qTotalTd.textContent = fmtInt(qTotal);
      qtr.appendChild(qTotalTd);

      qtr.addEventListener('click', (e) => {
        e.stopPropagation();
        if (hierExpandedQueues.has(qKey)) hierExpandedQueues.delete(qKey);
        else hierExpandedQueues.add(qKey);
        renderPivotVertical(filtered);
      });
      tbody.appendChild(qtr);

      if (!qExpanded) return;

      const sortedWf = Object.keys(tree[v][q]).sort();
      sortedWf.forEach(wf => {
        const wfTotal = activeMonths.reduce((s, m) => s + (tree[v][q][wf][m] || 0), 0);
        const wtr = document.createElement('tr');
        wtr.className = 'level-3';
        let wtd = document.createElement('td');
        wtd.className = 'name-cell indent-3';
        wtd.innerHTML = '<span class="wf-dot" style="background:' + wfDotColor(wf) + '"></span> ' + escHtml(wf);
        wtr.appendChild(wtd);
        activeMonths.forEach(m => {
          const td = document.createElement('td');
          td.className = 'num-cell';
          td.textContent = fmtInt(tree[v][q][wf][m] || 0);
          wtr.appendChild(td);
        });
        const wTotalTd = document.createElement('td');
        wTotalTd.className = 'num-cell';
        wTotalTd.textContent = fmtInt(wfTotal);
        wtr.appendChild(wTotalTd);
        tbody.appendChild(wtr);
      });
    });
  });

  const gtTotal = activeMonths.reduce((s, m) => s + (grandTotal[m] || 0), 0);
  const gtr = document.createElement('tr');
  gtr.className = 'hier-total';
  const gtd = document.createElement('td');
  gtd.className = 'name-cell indent-1';
  gtd.textContent = 'GRAND TOTAL';
  gtr.appendChild(gtd);
  activeMonths.forEach(m => {
    const td = document.createElement('td');
    td.className = 'num-cell';
    td.textContent = fmtInt(grandTotal[m] || 0);
    gtr.appendChild(td);
  });
  const gtTotalTd = document.createElement('td');
  gtTotalTd.className = 'num-cell';
  gtTotalTd.textContent = fmtInt(gtTotal);
  gtr.appendChild(gtTotalTd);
  tbody.appendChild(gtr);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderPivotWf(filtered) {
  const container = document.getElementById('pivotWfSection');
  const activeMonths = months.filter(m => selectedMonths.has(m));

  // Build tree: wfType -> vertical -> queue -> { month: fte }
  const tree = {};
  const wfAgg = {};    // wfType -> { month: fte }
  const vertAgg = {};  // wfType|||vertical -> { month: fte }
  const grandTotal = {};
  activeMonths.forEach(m => grandTotal[m] = 0);

  filtered.forEach(r => {
    const wf = r.wfType;
    const v = r.vertical;
    const q = r.queue;
    const m = r.month;

    if (!tree[wf]) tree[wf] = {};
    if (!tree[wf][v]) tree[wf][v] = {};
    if (!tree[wf][v][q]) { tree[wf][v][q] = {}; activeMonths.forEach(mm => tree[wf][v][q][mm] = 0); }
    tree[wf][v][q][m] += r.fte;

    if (!wfAgg[wf]) { wfAgg[wf] = {}; activeMonths.forEach(mm => wfAgg[wf][mm] = 0); }
    wfAgg[wf][m] += r.fte;

    const vKey = wf + '|||' + v;
    if (!vertAgg[vKey]) { vertAgg[vKey] = {}; activeMonths.forEach(mm => vertAgg[vKey][mm] = 0); }
    vertAgg[vKey][m] += r.fte;

    grandTotal[m] += r.fte;
  });

  // Build table
  container.innerHTML = '<div class="pivot-title">FTE by Workforce Type × Month</div><div class="hier-table"><table><thead><tr><th>Workforce Type / Vertical / Queue</th>' +
    activeMonths.map(m => '<th class="num-col">' + m + '</th>').join('') +
    '<th class="num-col">Total</th></tr></thead><tbody id="wfHierBody"></tbody></table></div>';

  const tbody = document.getElementById('wfHierBody');
  const sortedWf = Object.keys(tree).sort();

  sortedWf.forEach(wf => {
    const wfExpanded = wfHierExpandedWf.has(wf);

    wfRow.appendChild(wfTd);
    activeMonths.forEach(m => {
      const td = document.createElement('td');
      td.className = 'num-cell';
      td.textContent = fmtInt(wfAgg[wf][m] || 0);
      wfRow.appendChild(td);
    });
    const wfTotalTd = document.createElement('td');
    wfTotalTd.className = 'num-cell';
    wfTotalTd.textContent = fmtInt(wfTotal);
    wfRow.appendChild(wfTotalTd);

    wfRow.addEventListener('click', () => {
      if (wfHierExpandedWf.has(wf)) wfHierExpandedWf.delete(wf);
      else wfHierExpandedWf.add(wf);
      renderPivotWf(filtered);
    });
    tbody.appendChild(wfRow);

    if (!wfExpanded) return;

    // Level 2 - Verticals under this workforce type
    const sortedVerts = Object.keys(tree[wf]).sort();
    sortedVerts.forEach(v => {
      const vKey = wf + '|||' + v;
      const vExpanded = wfHierExpandedVerticals.has(vKey);
      const vTotal = activeMonths.reduce((s, m) => s + (vertAgg[vKey][m] || 0), 0);

      const vRow = document.createElement('tr');
      vRow.className = 'level-2';
      let vTd = document.createElement('td');
      vTd.className = 'name-cell indent-2';
      vTd.innerHTML = '<span class="toggle-arrow">' + (vExpanded ? '▼' : '▶') + '</span> ' + escHtml(v);
      vRow.appendChild(vTd);
      activeMonths.forEach(m => {
        const td = document.createElement('td');
        td.className = 'num-cell';
        td.textContent = fmtInt(vertAgg[vKey][m] || 0);
        vRow.appendChild(td);
      });
      const vTotalTd = document.createElement('td');
      vTotalTd.className = 'num-cell';
      vTotalTd.textContent = fmtInt(vTotal);
      vRow.appendChild(vTotalTd);

      vRow.addEventListener('click', (e) => {
        e.stopPropagation();
        if (wfHierExpandedVerticals.has(vKey)) wfHierExpandedVerticals.delete(vKey);
        else wfHierExpandedVerticals.add(vKey);
        renderPivotWf(filtered);
      });
      tbody.appendChild(vRow);

      if (!vExpanded) return;

      // Level 3 - Queues under this vertical
      const sortedQueues = Object.keys(tree[wf][v]).sort();
      sortedQueues.forEach(q => {
        const qTotal = activeMonths.reduce((s, m) => s + (tree[wf][v][q][m] || 0), 0);
        const qRow = document.createElement('tr');
        qRow.className = 'level-3';
        let qTd = document.createElement('td');
        qTd.className = 'name-cell indent-3';
        qTd.textContent = q;
        qRow.appendChild(qTd);
        activeMonths.forEach(m => {
          const td = document.createElement('td');
          td.className = 'num-cell';
          td.textContent = fmtInt(tree[wf][v][q][m] || 0);
          qRow.appendChild(td);
        });
        const qTotalTd = document.createElement('td');
        qTotalTd.className = 'num-cell';
        qTotalTd.textContent = fmtInt(qTotal);
        qRow.appendChild(qTotalTd);
        tbody.appendChild(qRow);
      });

  });

  // Grand total row
  const gtTotal = activeMonths.reduce((s, m) => s + (grandTotal[m] || 0), 0);
  const gtr = document.createElement('tr');
  gtr.className = 'hier-total';
  const gtd = document.createElement('td');
  gtd.className = 'name-cell indent-1';

    td.textContent = fmtInt(grandTotal[m] || 0);
    gtr.appendChild(td);

  gtTotalTd.className = 'num-cell';
  gtTotalTd.textContent = fmtInt(gtTotal);
  gtr.appendChild(gtTotalTd);
  tbody.appendChild(gtr);
}

// ===== HOURS BY WORKFORCE (Hierarchical: Workforce → Vertical → Queue) =====
function renderHrsByWf(filtered) {
  const container = document.getElementById('hrsByWfSection');
  const activeMonths = months.filter(m => selectedMonths.has(m));
  const nMonths = activeMonths.length;

  // Build tree: wf -> vertical -> queue -> { month: {prod, shrink, train, total} }
  const tree = {};
  const wfAgg = {};
  const vertAgg = {};
  const grandTotal = {};
  activeMonths.forEach(m => grandTotal[m] = {prod:0, shrink:0, train:0, total:0});

  filtered.forEach(r => {
    const wf = r.wfType, v = r.vertical, q = r.queue, m = r.month;
    const trainHrs = 0; // No training data in source

    if (!tree[wf]) tree[wf] = {};
    if (!tree[wf][v]) tree[wf][v] = {};
    if (!tree[wf][v][q]) { tree[wf][v][q] = {}; activeMonths.forEach(mm => tree[wf][v][q][mm] = {prod:0, shrink:0, train:0, total:0}); }
    tree[wf][v][q][m].prod += r.prodHrs;
    tree[wf][v][q][m].shrink += r.shrinkHrs;
    tree[wf][v][q][m].train += trainHrs;
    tree[wf][v][q][m].total += r.totalHrs;

    if (!wfAgg[wf]) { wfAgg[wf] = {}; activeMonths.forEach(mm => wfAgg[wf][mm] = {prod:0, shrink:0, train:0, total:0}); }
    wfAgg[wf][m].prod += r.prodHrs;
    wfAgg[wf][m].shrink += r.shrinkHrs;
    wfAgg[wf][m].train += trainHrs;
    wfAgg[wf][m].total += r.totalHrs;

    const vKey = wf + '|||' + v;
    if (!vertAgg[vKey]) { vertAgg[vKey] = {}; activeMonths.forEach(mm => vertAgg[vKey][mm] = {prod:0, shrink:0, train:0, total:0}); }
    vertAgg[vKey][m].prod += r.prodHrs;
    vertAgg[vKey][m].shrink += r.shrinkHrs;
    vertAgg[vKey][m].train += trainHrs;
    vertAgg[vKey][m].total += r.totalHrs;

    grandTotal[m].prod += r.prodHrs;
    grandTotal[m].shrink += r.shrinkHrs;
    grandTotal[m].train += trainHrs;
    grandTotal[m].total += r.totalHrs;
  });

  // Build header rows — Row 1: Month names spanning 4 cols each, Row 2: Prod/Shrink/Train/Total
  let headerRow1 = '<tr class="section-header"><th class="name-hdr" rowspan="2">Workforce / Vertical / Queue</th>';
  activeMonths.forEach(m => {
    headerRow1 += '<th colspan="4" class="section-divider" style="text-align:center;font-size:12px;color:var(--text)">' + m + '</th>';
  });
  headerRow1 += '</tr>';

  let headerRow2 = '<tr class="month-header">';
  activeMonths.forEach(m => {
    headerRow2 += '<th class="section-divider section-prod" style="color:var(--accent)">Prod</th>';
    headerRow2 += '<th class="section-shrink" style="color:var(--yellow)">Shrink</th>';
    headerRow2 += '<th class="section-train" style="color:var(--purple)">Train</th>';
    headerRow2 += '<th class="section-total" style="color:var(--green)">Total</th>';
  });
  headerRow2 += '</tr>';

  container.innerHTML = '<div class="pivot-title">Hours by Workforce Type × Month</div><div class="hrs-table"><table>' +
    '<thead>' + headerRow1 + headerRow2 + '</thead>' +
    '<tbody id="hrsByWfBody"></tbody></table></div>';

  const tbody = document.getElementById('hrsByWfBody');

  function addDataCells(row, dataByMonth, cls, isL1) {
    activeMonths.forEach(m => {
      const d = dataByMonth[m] || {prod:0, shrink:0, train:0, total:0};
      const tdP = document.createElement('td');
      tdP.className = (cls ? 'prod-col ' : '') + 'section-divider';
      tdP.textContent = fmtInt(d.prod);
      row.appendChild(tdP);
      const tdS = document.createElement('td');
      tdS.className = cls ? 'shrink-col' : '';
      tdS.textContent = fmtInt(d.shrink);
      row.appendChild(tdS);
      const tdT = document.createElement('td');
      tdT.className = cls ? 'train-col' : '';
      tdT.textContent = fmtInt(d.train);
      row.appendChild(tdT);
      const tdTot = document.createElement('td');
      tdTot.className = cls ? 'total-col' : '';
      tdTot.style.fontWeight = isL1 ? '700' : '';
      tdTot.textContent = fmtInt(d.total);
      row.appendChild(tdTot);
    });
  }

  const sortedWf = Object.keys(tree).sort();
  sortedWf.forEach(wf => {
    const wfExp = hrsExpandedWf.has(wf);

    // Level 1 - Workforce Type
    const r1 = document.createElement('tr');
    r1.className = 'hrs-l1';
    const td1 = document.createElement('td');
    td1.className = 'hrs-name';
    td1.innerHTML = '<span class="toggle-arrow">' + (wfExp ? '▼' : '▶') + '</span> <span class="wf-dot" style="background:' + wfDotColor(wf) + '"></span> ' + escHtml(wf);
    r1.appendChild(td1);
    addDataCells(r1, wfAgg[wf], true, true);
    r1.addEventListener('click', () => {
      if (hrsExpandedWf.has(wf)) hrsExpandedWf.delete(wf); else hrsExpandedWf.add(wf);
      renderHrsByWf(filtered);
    });
    tbody.appendChild(r1);

    if (!wfExp) return;

    // Level 2 - Verticals
    Object.keys(tree[wf]).sort().forEach(v => {
      const vKey = wf + '|||' + v;
      const vExp = hrsExpandedVert.has(vKey);

      const r2 = document.createElement('tr');
      r2.className = 'hrs-l2';
      const td2 = document.createElement('td');
      td2.className = 'hrs-name';
      td2.style.paddingLeft = '34px';
      td2.innerHTML = '<span class="toggle-arrow">' + (vExp ? '▼' : '▶') + '</span> ' + escHtml(v);
      r2.appendChild(td2);
      addDataCells(r2, vertAgg[vKey], false, false);
      r2.addEventListener('click', (e) => {
        e.stopPropagation();
        if (hrsExpandedVert.has(vKey)) hrsExpandedVert.delete(vKey); else hrsExpandedVert.add(vKey);
        renderHrsByWf(filtered);
      });
      tbody.appendChild(r2);

      if (!vExp) return;

      // Level 3 - Queues
      Object.keys(tree[wf][v]).sort().forEach(q => {
        const r3 = document.createElement('tr');
        r3.className = 'hrs-l3';
        const td3 = document.createElement('td');
        td3.className = 'hrs-name';
        td3.style.paddingLeft = '54px';
        td3.textContent = q;
        r3.appendChild(td3);
        addDataCells(r3, tree[wf][v][q], false, false);
        tbody.appendChild(r3);
      });
    });
  });

  // Grand total
  const gtr = document.createElement('tr');
  gtr.className = 'hrs-grand';
  const gtd = document.createElement('td');
  gtd.className = 'hrs-name';
  gtd.textContent = 'GRAND TOTAL';
  gtr.appendChild(gtd);
  addDataCells(gtr, grandTotal, true, true);
  tbody.appendChild(gtr);
}

// ===== VERSION HISTORY =====
function renderVersionHistory() {
  const container = document.getElementById('versionHistorySection');

  if (!versionHistory || versionHistory.length === 0) {
    container.innerHTML = '<div class="version-empty">No version history available. Load a Kitchenette file with a "Version" sheet.</div>';
    return;
  }

  function actionBadge(action) {
    const a = (action || '').toLowerCase();
    if (a.includes('creat')) return '<span class="badge badge-create">' + escHtml(action) + '</span>';
    if (a.includes('delet') || a.includes('remov')) return '<span class="badge badge-delete">' + escHtml(action) + '</span>';
    if (a.includes('updat') || a.includes('chang') || a.includes('modif')) return '<span class="badge badge-update">' + escHtml(action) + '</span>';
    return '<span class="badge badge-other">' + escHtml(action) + '</span>';
  }

  let html = '<div class="pivot-title">Version History</div><div class="version-table"><table>';
  html += '<thead><tr><th>Date</th><th>Vertical</th><th>Group</th><th>Queue</th><th>Action</th><th>Notes / Impact</th></tr></thead>';
  html += '<tbody>';

  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  function formatDateWithDay(dateStr) {
    if (!dateStr) return '';
    const parts = dateStr.split('-');
    if (parts.length === 3) {
      const d = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
      if (!isNaN(d.getTime())) return dateStr + ' (' + dayNames[d.getDay()] + ')';
    }
    return dateStr;
  }

  versionHistory.forEach(v => {
    html += '<tr>';
    html += '<td class="date-col">' + escHtml(formatDateWithDay(v.date || '')) + '</td>';
    html += '<td>' + escHtml(v.vertical || '') + '</td>';
    html += '<td>' + escHtml(v.group || '') + '</td>';
    html += '<td>' + escHtml(v.queue || '') + '</td>';
    html += '<td class="action-col">' + actionBadge(v.action || '') + '</td>';
    html += '<td class="notes-col">' + escHtml(v.notes || '') + '</td>';
    html += '</tr>';
  });

  html += '</tbody></table></div>';
  container.innerHTML = html;
}

// ===== EXPORT CSV =====
document.getElementById('exportBtn').addEventListener('click', () => {
  const filtered = getFilteredRows();
  const headers = columns.map(c => c.label);
  let csv = headers.join(',') + '\n';
  filtered.forEach(r => {
    csv += columns.map(c => {
      let v = r[c.key];
      if (typeof v === 'string') return '"' + v.replace(/"/g, '""') + '"';
      return v;
    }).join(',') + '\n';
  });
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'kitchenette_fte_export.csv';
  a.click();
  URL.revokeObjectURL(url);
});

// ===== FILE LOADING =====
function rebuildFromData() {
  allVerticals = [...new Set(workloadData.map(w => w.vertical))].sort();
  allWfTypes = [...new Set(workloadPctData.map(w => w.type))].sort();
  allQueues = [...new Set(workloadData.map(w => w.queue))].sort();

  selectedVerticals = new Set(allVerticals);
  selectedQueues = new Set(allQueues);
  selectedWfTypes = new Set(allWfTypes);
  selectedMonths = new Set(months);

  // Reset hierarchy expand states
  hierExpandedVerticals = new Set();
  hierExpandedQueues = new Set();
  hierNoQueueExpandedVerticals = new Set();
  wfHierExpandedWf = new Set();
  wfHierExpandedVerticals = new Set();
  hrsExpandedWf = new Set();
  hrsExpandedVert = new Set();

  initFilters();
  render();
}

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      parseExcel(e.target.result);
      lastFile = file;
      lastFileName = file.name;
      document.getElementById('fileStatus').textContent = '✓ ' + file.name;
      document.getElementById('fileStatus').style.color = 'var(--green)';
      document.getElementById('refreshBtn').style.display = '';
      rebuildFromData();
    } catch (err) {
      document.getElementById('fileStatus').textContent = '✗ Error: ' + err.message;
      document.getElementById('fileStatus').style.color = 'var(--red)';
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

// Load button
document.getElementById('loadBtn').addEventListener('click', () => {
  document.getElementById('fileInput').click();
});

document.getElementById('fileInput').addEventListener('change', (e) => {
  if (e.target.files.length > 0) {
    loadFile(e.target.files[0]);
  }
});

// Refresh button — re-reads the same file if user re-selects it
document.getElementById('refreshBtn').addEventListener('click', () => {
  // We can't re-read the same File object due to browser security,
  // so we open the file picker pre-filtered. User just clicks the same file.
  document.getElementById('fileInput').value = '';
  document.getElementById('fileInput').click();
});
